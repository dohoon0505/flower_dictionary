  <circle cx="485" cy="208" r="5" fill="#d9446c" opacity="0.7"/>
  <circle cx="512" cy="215" r="5" fill="#d9446c" opacity="0.7"/>
  <circle cx="540" cy="218" r="5" fill="#d9446c" opacity="0.7"/>
  <circle cx="568" cy="215" r="5" fill="#d9446c" opacity="0.7"/>
  <circle cx="592" cy="208" r="5" fill="#d9446c" opacity="0.7"/>

  <!-- Label -->
  <text x="555" y="272" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="10" fill="#e8748e">● 각 지역 꽃집</text>
