  <circle cx="530" cy="135" r="5" fill="#d9446c" opacity="0.8"/>
  <circle cx="562" cy="140" r="5" fill="#d9446c" opacity="0.8"/>
  <circle cx="592" cy="148" r="5" fill="#d9446c" opacity="0.8"/>
  <circle cx="618" cy="162" r="5" fill="#d9446c" opacity="0.7"/>

  <!-- Lower region -->
  <circle cx="478" cy="178" r="5" fill="#d9446c" opacity="0.7"/>
  <circle cx="506" cy="172" r="5" fill="#d9446c" opacity="0.7"/>
