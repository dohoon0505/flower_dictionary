<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 170" style="display:block;width:100%;height:auto" role="img" aria-label="전국꽃배달 주문 처리 흐름도">
  <defs>
    <marker id="op-ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d9446c"/>
    </marker>
    <marker id="op-ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="170" rx="12" fill="#fff5f7" stroke="#ffd0db" stroke-width="1"/>

  <!-- ── STEP 1: 주문 고객 ── -->
  <circle cx="72" cy="78" r="34" fill="#fff" stroke="#ffd0db" stroke-width="2"/>
  <!-- Person icon -->
  <circle cx="72" cy="62" r="10" fill="#d9446c"/>
  <path d="M 50,88 Q 50,75 72,75 Q 94,75 94,88" fill="#d9446c"/>
  <text x="72" y="130" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="12" font-weight="600" fill="#d9446c">주문 고객</text>

  <!-- Arrow 1→2 -->
  <line x1="109" y1="78" x2="143" y2="78" stroke="#ffa0b8" stroke-width="1.5" marker-end="url(#op-ar)"/>

  <!-- ── STEP 2: 전화·문자 주문 ── -->
  <rect x="150" y="50" width="130" height="57" rx="10" fill="#d9446c"/>
  <!-- Phone icon -->
  <rect x="198" y="59" width="16" height="22" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="200" y="61" width="12" height="16" rx="1" fill="#d9446c"/>
  <circle cx="204" cy="79" r="1.5" fill="#fff" opacity="0.9"/>
  <!-- Message icon -->
  <rect x="220" y="59" width="18" height="14" rx="3" fill="#fff" opacity="0.9"/>
  <path d="M 220,73 L 224,78 L 228,73" fill="#fff" opacity="0.9"/>
  <text x="215" y="100" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="10" font-weight="700" fill="#fff">전화 · 문자 주문</text>
  <text x="215" y="130" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="11" font-weight="600" fill="#d9446c">주문 접수</text>

  <!-- Arrow 2→3 -->
  <line x1="283" y1="78" x2="317" y2="78" stroke="#ffa0b8" stroke-width="1.5" marker-end="url(#op-ar)"/>

  <!-- ── STEP 3: 상품 주문 발생 ── -->
  <circle cx="360" cy="78" r="37" fill="#fff" stroke="#ffd0db" stroke-width="2"/>
  <!-- Document icon -->
  <rect x="345" y="55" width="28" height="36" rx="3" fill="#f9c0cd"/>
  <rect x="347" y="57" width="24" height="32" rx="2" fill="#fff" stroke="#ffd0db" stroke-width="1"/>
  <line x1="350" y1="65" x2="368" y2="65" stroke="#f9c0cd" stroke-width="2"/>
  <line x1="350" y1="71" x2="368" y2="71" stroke="#f9c0cd" stroke-width="2"/>
  <line x1="350" y1="77" x2="360" y2="77" stroke="#f9c0cd" stroke-width="2"/>
  <text x="360" y="130" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="11" font-weight="600" fill="#d9446c">상품 주문 발생</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="78" x2="434" y2="78" stroke="#ffa0b8" stroke-width="1.5" marker-end="url(#op-ar)"/>

  <!-- ── STEP 4: 배송 요청 ── -->
  <rect x="440" y="50" width="120" height="57" rx="10" fill="#d9446c"/>
  <!-- Truck icon -->
  <rect x="460" y="62" width="32" height="20" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="492" y="66" width="16" height="16" rx="2" fill="#fff" opacity="0.9"/>
  <circle cx="468" cy="82" r="5" fill="#d9446c" stroke="#fff" stroke-width="1.5"/>
  <circle cx="498" cy="82" r="5" fill="#d9446c" stroke="#fff" stroke-width="1.5"/>
  <text x="500" y="100" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="10" font-weight="700" fill="#fff">배송 요청</text>
  <text x="500" y="130" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="11" font-weight="600" fill="#d9446c">꽃집 발주</text>

  <!-- Arrow 4→5 -->
  <line x1="563" y1="78" x2="597" y2="78" stroke="#ffa0b8" stroke-width="1.5" marker-end="url(#op-ar)"/>

  <!-- ── STEP 5: 인근 꽃집 ── -->
  <circle cx="648" cy="78" r="42" fill="#d9446c"/>
  <!-- Flower icon -->
  <!-- Petals -->
  <circle cx="648" cy="62" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="648" cy="78" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="636" cy="70" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="660" cy="70" r="8" fill="#fff" opacity="0.9"/>
  <!-- Center -->
  <circle cx="648" cy="70" r="7" fill="#d9446c"/>
  <circle cx="648" cy="70" r="4" fill="#ffd0dc"/>
  <text x="648" y="130" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="11" font-weight="700" fill="#d9446c">인근 꽃집</text>
  <text x="648" y="148" text-anchor="middle" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="11" font-weight="700" fill="#d9446c">3시간 이내 배송</text>
</svg>
